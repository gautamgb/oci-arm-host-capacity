name: OCI Instance Hunter

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install

      # THIS IS THE FIX: Write the secret to a physical file
      - name: Create Key File
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_private_key.pem
          chmod 600 oci_private_key.pem

      - name: Run Provisioning Script
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          # Pass the FILENAME here, not the actual key text
          OCI_PRIVATE_KEY_FILENAME: oci_private_key.pem 
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          # Add any other variables your script expects
          # ADD THESE THREE LINES BELOW:
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_SHAPE: "VM.Standard.A1.Flex"
          OCI_OCPU_COUNT: "4"
          OCI_MEMORY_IN_GBS: "24"
          OCI_BOOT_VOLUME_SIZE_IN_GBS: "50"
          OCI_DISPLAY_NAME: "MyFreeInstance"
        run: php index.php
